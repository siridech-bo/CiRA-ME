# CiRA ME - Mosquitto MQTT Broker Configuration
# Handles sensor data ingestion for live streaming apps

# TCP listener for IoT devices, gateways, sensors
listener 1883
protocol mqtt

# WebSocket listener for browser connections (mqtt.js)
listener 9001
protocol websockets

# Allow anonymous connections (for factory internal networks)
# For production with auth, set to false and configure password_file
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type warning
log_type error
connection_messages true
