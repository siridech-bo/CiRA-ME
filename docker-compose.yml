# CiRA ME - Docker Compose Configuration
# Machine Intelligence for Edge Computing

services:
  # Backend - Flask Python API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cirame-backend
    restart: unless-stopped

    environment:
      # Flask configuration
      - FLASK_APP=run.py
      - FLASK_HOST=0.0.0.0
      - FLASK_DEBUG=${FLASK_DEBUG:-False}

      # Database configuration
      - DATABASE_PATH=/app/data/cirame.db

      # Python optimizations
      - PYTHONUNBUFFERED=1
      - PYTHONOPTIMIZE=1

      # GPU/CUDA support - remove or set to specific GPU IDs if needed
      # - CUDA_VISIBLE_DEVICES=0  # Uncomment to use only GPU 0

    volumes:
      # Persistent data volumes
      - backend-data:/app/data
      - backend-models:/app/models
      # Shared folder - put datasets here for customers to access
      - ./shared:/app/datasets/shared

    ports:
      # Expose backend port (optional - frontend proxies through nginx)
      - "5100:5100"

    networks:
      - cirame-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5100/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # Resource limits (adjust based on your server capacity)
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G
          # NVIDIA GPU support - requires nvidia-container-toolkit on host
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Frontend - Vue.js + Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # API URL - empty string means use relative path (proxied by nginx)
        - VITE_API_URL=/api
    container_name: cirame-frontend
    restart: unless-stopped

    ports:
      # Main application port
      - "${FRONTEND_PORT:-3030}:80"

    networks:
      - cirame-network

    depends_on:
      backend:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # TI TinyML ModelMaker - Separate Python 3.10 container
  ti-modelmaker:
    build:
      context: ./ti-modelmaker
      dockerfile: Dockerfile
    container_name: cirame-ti-modelmaker
    restart: unless-stopped

    volumes:
      # Share datasets with backend
      - ./shared:/app/data/datasets/shared
      - ti-projects:/app/data/projects

    ports:
      - "5200:5200"

    networks:
      - cirame-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5200/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '1.0'
          memory: 2G

  # MQTT Broker - Mosquitto (for live sensor streaming)
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: cirame-mosquitto
    restart: unless-stopped

    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto-data:/mosquitto/data

    ports:
      - "1883:1883"    # MQTT TCP (for IoT devices, gateways, sensors)
      - "9001:9001"    # MQTT WebSocket (for browser connections)

    networks:
      - cirame-network

    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

# Named volumes for persistent data
volumes:
  backend-data:
  backend-models:
  ti-projects:
  mosquitto-data:

# Network for service communication
networks:
  cirame-network:
    driver: bridge
