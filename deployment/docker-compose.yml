# CiRA ME - Production Docker Compose Configuration
# Machine Intelligence for Edge Computing
# For deployment on customer Windows servers

services:
  # Backend - Flask Python API
  backend:
    image: cirame-backend:latest
    container_name: cirame-backend
    restart: unless-stopped

    environment:
      - FLASK_APP=run.py
      - FLASK_HOST=0.0.0.0
      - FLASK_DEBUG=False
      - DATABASE_PATH=/app/data/cirame.db
      - PYTHONUNBUFFERED=1
      - PYTHONOPTIMIZE=1
      - MQTT_BROKER_HOST=cirame-mosquitto
      - MQTT_BROKER_PORT=1883

    volumes:
      # Persistent data on local disk (survives container updates, easy to backup)
      - ./data/database:/app/data
      - ./data/models:/app/models
      # Datasets folder - includes shared/ AND all user private folders
      # Mounting the entire datasets root ensures user-uploaded data persists across updates
      - ./datasets:/app/datasets
      # Folder Watcher data - per-user input/output folders for the file-polling daemon
      - ./watcher-data:/app/watcher-data

    ports:
      # Expose backend port (optional - frontend proxies through nginx)
      - "5100:5100"

    networks:
      - cirame-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5100/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # First boot on a customer box can take 60-90s (SQLite init +
      # migrations + torch import + model warm-up). Give the daemon
      # 120s before it flips backend to unhealthy — otherwise the
      # frontend depends_on wait times out and everything looks broken.
      start_period: 120s

    # Resource limits (adjust based on your server capacity)
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G
          # NVIDIA GPU support - requires nvidia-container-toolkit on host
          # Comment out this section if no GPU available
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Frontend - Vue.js + Nginx
  frontend:
    image: cirame-frontend:latest
    container_name: cirame-frontend
    restart: unless-stopped

    ports:
      # Main application port - access at http://localhost:3030
      - "3030:80"

    networks:
      - cirame-network

    depends_on:
      backend:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # TI TinyML ModelMaker (optional — for TMS320 MCU customers)
  # Remove this service if not deploying to TI MCUs
  ti-modelmaker:
    image: cirame-ti-modelmaker:latest
    container_name: cirame-ti-modelmaker
    restart: unless-stopped
    volumes:
      # Mount full datasets folder so TI ModelMaker can access shared + user private folders
      - ./datasets:/app/data/datasets
      - ./data/ti-projects:/app/data/projects
    ports:
      - "5200:5200"
    networks:
      - cirame-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5200/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G

  # MQTT Broker (optional — for live sensor streaming)
  # Remove this service if not using live streaming
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: cirame-mosquitto
    restart: unless-stopped
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./data/mosquitto:/mosquitto/data
    ports:
      - "1883:1883"
      - "9001:9001"
    networks:
      - cirame-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

# All user data is stored on the host disk (bind-mounted into containers):
#   data/database/    — SQLite database (users, models, endpoints, apps)
#   data/models/      — Trained model files (.pkl, .onnx)
#   data/ti-projects/ — TI ModelMaker training projects
#   data/mosquitto/   — MQTT broker persistent data
#   datasets/         — User-uploaded datasets (shared/ + per-user private folders)
#
# To backup:  copy the entire data/ and datasets/ folders
# To restore: copy them back before starting
# To migrate from another deployment folder: run migrate.bat / migrate.sh
# See MIGRATION.md for full update/migration guide.

# Network for service communication
networks:
  cirame-network:
    driver: bridge
