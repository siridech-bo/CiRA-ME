# CiRA ME - Production Docker Compose Configuration (No GPU)
# Machine Intelligence for Edge Computing
# Use this file if the server does not have NVIDIA GPU

services:
  # Backend - Flask Python API (CPU only)
  backend:
    image: cirame-backend:latest
    container_name: cirame-backend
    restart: unless-stopped

    environment:
      - FLASK_APP=run.py
      - FLASK_HOST=0.0.0.0
      - FLASK_DEBUG=False
      - DATABASE_PATH=/app/data/cirame.db
      - PYTHONUNBUFFERED=1
      - PYTHONOPTIMIZE=1
      - CUDA_VISIBLE_DEVICES=""
      - MQTT_BROKER_HOST=cirame-mosquitto
      - MQTT_BROKER_PORT=1883

    volumes:
      - backend-data:/app/data
      - backend-models:/app/models
      - ./shared:/app/datasets/shared

    ports:
      - "5100:5100"

    networks:
      - cirame-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5100/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G

  # Frontend - Vue.js + Nginx
  frontend:
    image: cirame-frontend:latest
    container_name: cirame-frontend
    restart: unless-stopped

    ports:
      - "3030:80"

    networks:
      - cirame-network

    depends_on:
      backend:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # TI TinyML ModelMaker (optional)
  ti-modelmaker:
    image: cirame-ti-modelmaker:latest
    container_name: cirame-ti-modelmaker
    restart: unless-stopped
    volumes:
      - ./shared:/app/data/datasets/shared
      - ti-projects:/app/data/projects
    ports:
      - "5200:5200"
    networks:
      - cirame-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5200/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G

  # MQTT Broker (optional)
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: cirame-mosquitto
    restart: unless-stopped
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto-data:/mosquitto/data
    ports:
      - "1883:1883"
      - "9001:9001"
    networks:
      - cirame-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

volumes:
  backend-data:
  backend-models:
  ti-projects:
  mosquitto-data:

networks:
  cirame-network:
    driver: bridge
